version: "3.9"
services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports: ["9000:9000","9001:9001"]
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes: [minio_data:/data]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "sleep 5;
        mc alias set local http://minio:9000 admin password;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        echo 'Buckets bronze/silver/gold créés';"

  postgres:
    image: postgres:15
    container_name: airflow-db
    environment: {POSTGRES_USER: airflow, POSTGRES_PASSWORD: airflow, POSTGRES_DB: airflow}
    volumes: [postgres_data:/var/lib/postgresql/data]

  airflow-init:
    image: apache/airflow:2.9.1
    depends_on: [postgres]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
    command: db init

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow-webserver
    depends_on: [airflow-init]
    ports: ["8080:8080"]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
    volumes: [./airflow/dags:/opt/airflow/dags]
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.1
    depends_on: [airflow-webserver]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
    volumes: [./airflow/dags:/opt/airflow/dags]
    command: scheduler

volumes:
  minio_data:
  postgres_data:
